<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Joshua Chung — 3D Portfolio</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #020408;
    --accent: #00e5ff;
    --accent2: #7c3aed;
    --accent3: #f59e0b;
    --text: #e2e8f0;
    --muted: #64748b;
  }
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: var(--bg); }

  body { font-family: 'JetBrains Mono', monospace; cursor: none; }

  #three-canvas {
    position: fixed; inset: 0; z-index: 0;
  }

  /* Custom cursor */
  .cursor-dot {
    position: fixed; width: 8px; height: 8px;
    background: var(--accent); border-radius: 50%;
    transform: translate(-50%,-50%);
    pointer-events: none; z-index: 9999;
    transition: transform 0.1s, background 0.2s;
    mix-blend-mode: screen;
  }
  .cursor-ring {
    position: fixed; width: 40px; height: 40px;
    border: 1px solid rgba(0,229,255,0.5);
    border-radius: 50%;
    transform: translate(-50%,-50%);
    pointer-events: none; z-index: 9998;
    transition: all 0.12s ease;
    mix-blend-mode: screen;
  }
  .cursor-ring.hover { width: 60px; height: 60px; border-color: var(--accent); background: rgba(0,229,255,0.05); }

  /* HUD Nav */
  #hud {
    position: fixed; top: 0; left: 0; right: 0; z-index: 100;
    display: flex; align-items: center; justify-content: space-between;
    padding: 1.5rem 3rem;
    background: linear-gradient(to bottom, rgba(2,4,8,0.9), transparent);
    pointer-events: none;
  }
  .hud-logo {
    font-family: 'Syne', sans-serif; font-weight: 800;
    font-size: 1rem; color: var(--accent);
    letter-spacing: 0.2em; text-transform: uppercase;
    pointer-events: all;
  }
  .hud-nav { display: flex; gap: 0.5rem; pointer-events: all; }
  .hud-btn {
    padding: 0.45rem 1.1rem;
    border: 1px solid rgba(0,229,255,0.2);
    background: rgba(0,229,255,0.04);
    color: var(--muted);
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.65rem; letter-spacing: 0.15em; text-transform: uppercase;
    border-radius: 3px; cursor: pointer;
    transition: all 0.2s;
  }
  .hud-btn:hover, .hud-btn.active {
    border-color: var(--accent); color: var(--accent);
    background: rgba(0,229,255,0.1);
  }

  /* Bottom controls */
  #controls-hint {
    position: fixed; bottom: 2rem; left: 50%;
    transform: translateX(-50%);
    display: flex; gap: 2rem; align-items: center;
    z-index: 100;
    background: rgba(2,4,8,0.6);
    backdrop-filter: blur(10px);
    border: 1px solid rgba(0,229,255,0.1);
    padding: 0.7rem 1.8rem; border-radius: 100px;
    transition: opacity 0.5s;
  }
  .hint-item {
    display: flex; align-items: center; gap: 0.5rem;
    font-size: 0.62rem; color: var(--muted); letter-spacing: 0.1em;
  }
  .hint-key {
    padding: 0.2rem 0.5rem;
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: 3px; font-size: 0.6rem; color: rgba(255,255,255,0.6);
    background: rgba(255,255,255,0.05);
  }

  /* Info Panel — slides in from right */
  #panel {
    position: fixed; top: 50%; right: 0;
    transform: translateY(-50%) translateX(110%);
    width: 380px;
    background: rgba(6,8,16,0.92);
    backdrop-filter: blur(24px);
    border: 1px solid rgba(0,229,255,0.15);
    border-right: none;
    border-radius: 16px 0 0 16px;
    padding: 2.5rem;
    z-index: 200;
    transition: transform 0.5s cubic-bezier(0.23,1,0.32,1);
    max-height: 85vh;
    overflow-y: auto;
  }
  #panel.open { transform: translateY(-50%) translateX(0); }
  #panel::-webkit-scrollbar { width: 3px; }
  #panel::-webkit-scrollbar-track { background: transparent; }
  #panel::-webkit-scrollbar-thumb { background: rgba(0,229,255,0.3); border-radius: 2px; }

  .panel-tag {
    font-size: 0.6rem; color: var(--accent);
    letter-spacing: 0.2em; text-transform: uppercase;
    margin-bottom: 0.8rem;
  }
  .panel-title {
    font-family: 'Syne', sans-serif; font-size: 1.6rem;
    font-weight: 800; line-height: 1.1;
    margin-bottom: 1rem; letter-spacing: -0.02em;
  }
  .panel-desc {
    font-size: 0.73rem; line-height: 1.9;
    color: var(--muted); margin-bottom: 1.5rem;
  }
  .panel-tags { display: flex; flex-wrap: wrap; gap: 0.4rem; margin-bottom: 1.5rem; }
  .ptag {
    padding: 0.2rem 0.65rem;
    background: rgba(124,58,237,0.12);
    border: 1px solid rgba(124,58,237,0.3);
    border-radius: 3px; font-size: 0.6rem;
    color: #a78bfa; letter-spacing: 0.06em;
  }
  .panel-metrics { display: flex; gap: 1.5rem; margin-bottom: 1.5rem; }
  .pm-val {
    font-family: 'Syne', sans-serif;
    font-size: 1.4rem; font-weight: 700; color: var(--accent3);
  }
  .pm-label { font-size: 0.58rem; color: var(--muted); letter-spacing: 0.1em; text-transform: uppercase; }
  .panel-link {
    display: inline-flex; align-items: center; gap: 0.5rem;
    padding: 0.7rem 1.5rem;
    background: rgba(0,229,255,0.08);
    border: 1px solid rgba(0,229,255,0.3);
    border-radius: 4px;
    color: var(--accent); font-size: 0.68rem;
    letter-spacing: 0.12em; text-transform: uppercase;
    text-decoration: none; cursor: pointer;
    transition: all 0.2s;
    margin-right: 0.5rem; margin-bottom: 0.5rem;
    display: inline-block;
  }
  .panel-link:hover { background: rgba(0,229,255,0.18); border-color: var(--accent); }
  .panel-close {
    position: absolute; top: 1rem; right: 1rem;
    width: 28px; height: 28px;
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 50%; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    color: var(--muted); font-size: 0.75rem;
    transition: all 0.2s; background: none;
  }
  .panel-close:hover { border-color: var(--accent); color: var(--accent); }

  /* Updated Section title overlay to be centered */
  #scene-label {
    position: fixed; bottom: 8%; left: 50%;
    transform: translateX(-50%);
    z-index: 100;
    pointer-events: none;
    transition: opacity 0.4s;
    text-align: center;
  }
  .sl-num { font-size: 0.6rem; color: var(--accent); letter-spacing: 0.25em; text-transform: uppercase; margin-bottom: 0.3rem; }
  .sl-title { font-family: 'Syne', sans-serif; font-size: 1.8rem; font-weight: 800; letter-spacing: -0.02em; opacity: 0.9; }

  /* Minimap */
  #minimap {
    position: fixed; bottom: 2rem; right: 2rem; z-index: 100;
    width: 120px;
  }
  .mm-title { font-size: 0.55rem; color: var(--muted); letter-spacing: 0.15em; text-transform: uppercase; margin-bottom: 0.5rem; }
  .mm-nodes { display: flex; flex-direction: column; gap: 0.4rem; }
  .mm-node {
    display: flex; align-items: center; gap: 0.5rem;
    cursor: pointer; padding: 0.2rem 0;
    transition: all 0.2s;
  }
  .mm-node:hover .mm-dot { background: var(--accent); box-shadow: 0 0 8px var(--accent); }
  .mm-node:hover .mm-label { color: var(--text); }
  .mm-dot {
    width: 6px; height: 6px; border-radius: 50%;
    background: rgba(0,229,255,0.3);
    border: 1px solid rgba(0,229,255,0.4);
    transition: all 0.3s; flex-shrink: 0;
  }
  .mm-dot.active { background: var(--accent); box-shadow: 0 0 10px var(--accent); }
  .mm-label { font-size: 0.6rem; color: var(--muted); letter-spacing: 0.08em; transition: color 0.2s; }
  .mm-label.active { color: var(--accent); }

  /* Loading screen */
  #loading {
    position: fixed; inset: 0; z-index: 999;
    background: var(--bg);
    display: flex; align-items: center; justify-content: center;
    flex-direction: column; gap: 1.5rem;
    transition: opacity 0.8s;
  }
  #loading.hidden { opacity: 0; pointer-events: none; }
  .load-logo { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 2rem; color: var(--accent); letter-spacing: 0.2em; }
  .load-bar-wrap { width: 200px; height: 2px; background: rgba(0,229,255,0.1); border-radius: 1px; overflow: hidden; }
  .load-bar { height: 100%; background: var(--accent); width: 0; transition: width 1s ease; border-radius: 1px; }
  .load-text { font-size: 0.6rem; color: var(--muted); letter-spacing: 0.2em; text-transform: uppercase; }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 0; }
</style>
</head>
<body>

<div id="loading">
  <div class="load-logo">JC.DS</div>
  <div class="load-bar-wrap"><div class="load-bar" id="load-bar"></div></div>
  <div class="load-text" id="load-text">Initializing scene...</div>
</div>

<canvas id="three-canvas"></canvas>

<div class="cursor-dot" id="cdot"></div>
<div class="cursor-ring" id="cring"></div>

<div id="hud">
  <div class="hud-logo">JC.DS</div>
  <div class="hud-nav">
    <button class="hud-btn active" data-section="0">Hero</button>
    <button class="hud-btn" data-section="1">Projects</button>
    <button class="hud-btn" data-section="2">Experience</button>
    <button class="hud-btn" data-section="3">Skills</button>
    <button class="hud-btn" data-section="4">Athletics</button>
    <button class="hud-btn" data-section="5">Contact</button>
  </div>
</div>

<div id="scene-label">
  <div class="sl-num" id="sl-num">// 00 — Home</div>
  <div class="sl-title" id="sl-title">Joshua Chung</div>
</div>

<div id="minimap">
  <div class="mm-title">Navigate</div>
  <div class="mm-nodes" id="mm-nodes"></div>
</div>

<div id="controls-hint">
  <div class="hint-item"><span class="hint-key">Drag</span> Rotate</div>
  <div class="hint-item"><span class="hint-key">Scroll</span> Zoom</div>
  <div class="hint-item"><span class="hint-key">Click</span> Explore</div>
  <div class="hint-item"><span class="hint-key">←→</span> Navigate</div>
</div>

<div id="panel">
  <button class="panel-close" id="panel-close">✕</button>
  <div class="panel-tag" id="p-tag"></div>
  <div class="panel-title" id="p-title"></div>
  <div class="panel-desc" id="p-desc"></div>
  <div class="panel-tags" id="p-tags"></div>
  <div class="panel-metrics" id="p-metrics"></div>
  <div id="p-links"></div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
// =============================================
// DATA
// =============================================
const SECTIONS = [
  { id: 0, label: '00 — Home', title: 'Joshua Chung', position: [0, 0, 0] },
  { id: 1, label: '01 — Projects', title: 'What I\'ve Built', position: [25, 0, -5] },
  { id: 2, label: '02 — Experience', title: 'Where I\'ve Worked', position: [50, 0, -10] },
  { id: 3, label: '03 — Skills', title: 'Technical Toolkit', position: [75, 0, -5] },
  { id: 4, label: '04 — Athletics', title: 'Beyond the Terminal', position: [100, 0, 0] },
  { id: 5, label: '05 — Contact', title: "Let's Connect", position: [125, 0, 5] },
];

const NODE_DATA = {
  hero: {
    tag: '// Available for opportunities',
    title: 'Joshua Chung',
    desc: 'Statistics & Data Science @ UC Santa Barbara (Class of 2027). Building ML pipelines, interactive dashboards, and data-driven products. Former Division I golfer. GPA 3.3.',
    tags: ['Python', 'Machine Learning', 'ETL Pipelines', 'NLP', 'PostgreSQL', 'Streamlit'],
    metrics: [{ val: '0.847', label: 'ROC-AUC' }, { val: '70K+', label: 'Records' }, { val: '100+', label: 'Users' }],
    links: [{ text: 'GitHub ↗', href: 'https://github.com/josh11100' }, { text: 'LinkedIn ↗', href: 'https://www.linkedin.com/in/joshua-chung858/' }],
  },
  gaucho: {
    tag: '01 — Featured Project',
    title: 'Gaucho Insights',
    desc: 'Async scraper extracting data from 1,000+ UCSB professor profiles, merged into a 70,000+ record dataset via fuzzy matching. Applied 5 ML/statistical methods: KL-divergence anomaly detection, KMeans teaching-style clustering, cosine similarity for course recommendations, GPA forecasting, and prof-course fit scoring.',
    tags: ['Python', 'Streamlit', 'Scikit-learn', 'Pandas', 'NLP', 'Playwright', 'KMeans', 'TF-IDF'],
    metrics: [{ val: '1,000+', label: 'Profiles' }, { val: '70K+', label: 'Records' }, { val: '100+', label: 'Active Users' }],
    links: [{ text: 'Live App ↗', href: 'https://ucsb-insight.streamlit.app/' }],
  },
  churniq: {
    tag: '02 — Project',
    title: 'ChurnIQ',
    desc: 'End-to-end churn prediction pipeline on 7,000+ records. XGBoost classifier with class-imbalance correction, SHAP TreeExplainer for per-prediction waterfall explanations, and Streamlit dashboard with single-record and bulk CSV scoring modes.',
    tags: ['XGBoost', 'SHAP', 'Scikit-learn', 'Streamlit', 'Logistic Regression', 'Python'],
    metrics: [{ val: '0.847', label: 'ROC-AUC' }, { val: '79%', label: 'Recall' }, { val: '7K+', label: 'Records' }],
    links: [],
  },
  familytree: {
    tag: '03 — Project',
    title: 'Family Tree Program',
    desc: 'Family tree system in C++ supporting insertion, relationship queries, and multi-generational ancestry traversal using dynamic graph data structures with modular class design and optimized traversal algorithms.',
    tags: ['C++', 'Data Structures', 'Graph Algorithms', 'OOP'],
    metrics: [],
    links: [],
  },
  nexus: {
    tag: '02 — Experience',
    title: 'Daily Nexus — Data Analyst',
    desc: 'Jan 2026 – Present. Cleaned and analyzed public datasets on housing, campus trends, and local policy. Built reusable Python pipelines to automate ingestion of recurring public records datasets. Collaborated with editors to translate findings into interactive visualizations for non-technical audiences.',
    tags: ['Python', 'Datawrapper', 'Data Journalism', 'ETL', 'Statistical Analysis'],
    metrics: [],
    links: [],
  },
  zfacemeleon: {
    tag: '02 — Experience',
    title: 'ZFaceMelon — Full-Stack Intern',
    desc: 'Jun–Sep 2024. Designed normalized PostgreSQL schemas and automated ETL pipelines for real-time querying. Built a secure subscription and auth system using Stripe + Flask, and developed backend REST APIs for scalable multi-tier user authorization.',
    tags: ['PostgreSQL', 'Flask', 'ETL', 'Stripe', 'REST APIs', 'Python'],
    metrics: [],
    links: [],
  },
  athletics: {
    tag: '04 — Athletics',
    title: 'D1 Golf — UCSB Gauchos',
    desc: 'Earned a starting varsity spot as a freshman and competed in 16 rounds across the Big West Conference. Entered college ranked 52nd nationally and 8th in California. Competed at the Big West Championships while earning Big West Commissioner\'s Highest Honors (3.51+ GPA).',
    tags: ['Division I', 'Big West Conference', 'Commissioner\'s Honors', 'Starting Varsity'],
    metrics: [{ val: '75.9', label: 'Scoring Avg' }, { val: '52nd', label: 'National Rank' }, { val: '3.51+', label: 'Honors GPA' }],
    links: [],
  },
};

// =============================================
// SCENE SETUP
// =============================================
const canvas = document.getElementById('three-canvas');
const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: true });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.2;

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x020408);
scene.fog = new THREE.FogExp2(0x020408, 0.012);

const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 500);
camera.position.set(0, 6, 18);
camera.lookAt(0, 0, 0);

const camTarget = { x: 0, y: 0, z: 0 };
const camPos = { x: 0, y: 6, z: 18 };
let currentSection = 0;

// =============================================
// MATERIALS & COLORS
// =============================================
const COLORS = {
  cyan: 0x00e5ff,
  purple: 0x7c3aed,
  amber: 0xf59e0b,
  white: 0xffffff,
  dark: 0x111827,
};

function glowMat(color, opacity = 1) {
  return new THREE.MeshStandardMaterial({ color, emissive: color, emissiveIntensity: 0.4, transparent: opacity < 1, opacity });
}

// =============================================
// FLOOR GRID
// =============================================
const gridHelper = new THREE.GridHelper(300, 80, 0x00e5ff, 0x00e5ff);
gridHelper.material.opacity = 0.06;
gridHelper.material.transparent = true;
gridHelper.position.y = -4;
scene.add(gridHelper);

// =============================================
// AMBIENT & LIGHTS
// =============================================
const ambientLight = new THREE.AmbientLight(0x0a0f1e, 1);
scene.add(ambientLight);

const directionalLight = new THREE.DirectionalLight(0x00e5ff, 0.4);
directionalLight.position.set(10, 20, 10);
scene.add(directionalLight);

function addPointLight(color, intensity, x, y, z) {
  const l = new THREE.PointLight(color, intensity, 30);
  l.position.set(x, y, z);
  scene.add(l);
  return l;
}

// =============================================
// FLOATING PARTICLES
// =============================================
const particleGeo = new THREE.BufferGeometry();
const pCount = 800;
const pPositions = new Float32Array(pCount * 3);
for (let i = 0; i < pCount; i++) {
  pPositions[i * 3] = (Math.random() - 0.5) * 200;
  pPositions[i * 3 + 1] = (Math.random() - 0.5) * 40;
  pPositions[i * 3 + 2] = (Math.random() - 0.5) * 60;
}
particleGeo.setAttribute('position', new THREE.BufferAttribute(pPositions, 3));
const particleMat = new THREE.PointsMaterial({ color: 0x00e5ff, size: 0.12, transparent: true, opacity: 0.5 });
const particles = new THREE.Points(particleGeo, particleMat);
scene.add(particles);

// =============================================
// SECTION NODE BUILDER
// =============================================
const allNodes = [];
const sectionGroups = [];
const SECTION_X = [0, 25, 50, 75, 100, 125];

function makeLabel(text, size = 24, color = '#00e5ff', font = 'Syne') {
  const c = document.createElement('canvas');
  c.width = 512; c.height = 128;
  const ctx = c.getContext('2d');
  ctx.fillStyle = 'rgba(0,0,0,0)';
  ctx.fillRect(0, 0, 512, 128);
  ctx.fillStyle = color;
  ctx.font = `700 ${size}px ${font}, monospace`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText(text, 256, 64);
  const tex = new THREE.CanvasTexture(c);
  const mat = new THREE.SpriteMaterial({ map: tex, transparent: true });
  const sprite = new THREE.Sprite(mat);
  sprite.scale.set(8, 2, 1);
  return sprite;
}

function makeSmallLabel(text, color = '#64748b') {
  const s = makeLabel(text, 14, color, 'JetBrains Mono');
  s.scale.set(5, 1, 1);
  return s;
}

// =============================================
// SECTION 0: HERO
// =============================================
{
  const g = new THREE.Group();
  g.position.x = SECTION_X[0];

  const orbGeo = new THREE.IcosahedronGeometry(2.5, 4);
  const orbMat = new THREE.MeshStandardMaterial({
    color: 0x050a14, roughness: 0.1, metalness: 0.9,
    emissive: 0x00e5ff, emissiveIntensity: 0.08,
  });
  const orb = new THREE.Mesh(orbGeo, orbMat);
  orb.userData = { nodeKey: 'hero', clickable: true };
  g.add(orb);
  allNodes.push(orb);

  const ringGeo = new THREE.TorusGeometry(3.5, 0.03, 16, 100);
  const ringMat = new THREE.MeshBasicMaterial({ color: 0x00e5ff, transparent: true, opacity: 0.4 });
  const ring = new THREE.Mesh(ringGeo, ringMat);
  ring.rotation.x = Math.PI / 2;
  g.add(ring);

  const ring2 = new THREE.Mesh(
    new THREE.TorusGeometry(4.2, 0.02, 16, 100),
    new THREE.MeshBasicMaterial({ color: 0x7c3aed, transparent: true, opacity: 0.25 })
  );
  ring2.rotation.x = Math.PI / 3;
  ring2.rotation.z = Math.PI / 6;
  g.add(ring2);

  const satellites = [
    { r: 5, angle: 0, size: 0.4, color: 0x00e5ff, speed: 0.008 },
    { r: 6, angle: 2.1, size: 0.25, color: 0x7c3aed, speed: -0.005 },
    { r: 4.5, angle: 4.2, size: 0.3, color: 0xf59e0b, speed: 0.011 },
  ];
  const satMeshes = [];
  satellites.forEach(s => {
    const sm = new THREE.Mesh(
      new THREE.SphereGeometry(s.size, 12, 12),
      new THREE.MeshStandardMaterial({ color: s.color, emissive: s.color, emissiveIntensity: 0.8 })
    );
    sm.userData = { satConfig: s, angle: s.angle };
    g.add(sm);
    satMeshes.push(sm);
  });
  g.userData.satMeshes = satMeshes;
  g.userData.satellites = satellites;

  const nameLabel = makeLabel('JOSHUA CHUNG', 28, '#e2e8f0');
  nameLabel.position.set(0, 5, 0);
  g.add(nameLabel);

  const subLabel = makeSmallLabel('Statistics & Data Science • UCSB', '#64748b');
  subLabel.position.set(0, 3.8, 0);
  g.add(subLabel);

  const statsData = [{ val: '0.847', label: 'ROC-AUC', pos: [-6, 2, -2] }, { val: '70K+', label: 'Records', pos: [7, 1, -3] }, { val: 'D1', label: 'Golfer', pos: [0, -3, -4] }];
  statsData.forEach(stat => {
    const sg = new THREE.Group();
    sg.position.set(...stat.pos);
    const sm = new THREE.Mesh(
      new THREE.OctahedronGeometry(0.6, 0),
      new THREE.MeshStandardMaterial({ color: 0xf59e0b, emissive: 0xf59e0b, emissiveIntensity: 0.6, wireframe: true })
    );
    sg.add(sm);
    const sl = makeLabel(stat.val, 20, '#f59e0b');
    sl.position.y = 1.3; sl.scale.set(4, 1, 1);
    sg.add(sl);
    const sl2 = makeSmallLabel(stat.label, '#64748b');
    sl2.position.y = 0.5;
    sg.add(sl2);
    g.add(sg);
  });

  scene.add(g);
  sectionGroups.push(g);
}

// =============================================
// SECTION 1: PROJECTS
// =============================================
{
  const g = new THREE.Group();
  g.position.x = SECTION_X[1];

  const projects = [
    { key: 'gaucho', name: 'Gaucho\nInsights', pos: [-8, 2, 0], color: 0x00e5ff, shape: 'featured' },

// =============================================
// MOUSE INTERACTION & RAYCASTING
// =============================================
const raycaster = new THREE.Raycaster();
const mouse = new THREE.Vector2();
let hoveredNode = null;
let mouseX = 0, mouseY = 0;
let isOrbiting = false, orbitStart = { x: 0, y: 0 };
let orbitDelta = { x: 0, y: 0 };

document.addEventListener('mousemove', e => {
  mouseX = e.clientX;
  mouseY = e.clientY;
  mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
  mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;

  document.getElementById('cdot').style.left = e.clientX + 'px';
  document.getElementById('cdot').style.top = e.clientY + 'px';
  setTimeout(() => {
    document.getElementById('cring').style.left = e.clientX + 'px';
    document.getElementById('cring').style.top = e.clientY + 'px';
  }, 60);

  if (isOrbiting) {
    orbitDelta.x = (e.clientX - orbitStart.x) * 0.005;
    orbitDelta.y = (e.clientY - orbitStart.y) * 0.005;
  }
});

canvas.addEventListener('mousedown', e => {
  isOrbiting = true;
  orbitStart.x = e.clientX;
  orbitStart.y = e.clientY;
  orbitDelta = { x: 0, y: 0 };
});

canvas.addEventListener('mouseup', e => {
  const wasDragging = Math.abs(orbitDelta.x) > 0.01 || Math.abs(orbitDelta.y) > 0.01;
  isOrbiting = false;
  orbitDelta = { x: 0, y: 0 };

  if (!wasDragging && hoveredNode && hoveredNode.userData.nodeKey) {
    openPanel(hoveredNode.userData.nodeKey);
  }
});

window.addEventListener('wheel', e => {
  if (e.deltaY > 0) navigateTo(Math.min(currentSection + 1, SECTIONS.length - 1));
  else navigateTo(Math.max(currentSection - 1, 0));
}, { passive: true });

window.addEventListener('keydown', e => {
  if (e.key === 'ArrowRight') navigateTo(Math.min(currentSection + 1, SECTIONS.length - 1));
  if (e.key === 'ArrowLeft') navigateTo(Math.max(currentSection - 1, 0));
  if (e.key === 'Escape') closePanel();
});

// =============================================
// NAVIGATION
// =============================================
const sectionLabels = ['// 00 — Home', '// 01 — Projects', '// 02 — Experience', '// 03 — Skills', '// 04 — Athletics', '// 05 — Contact'];
const sectionTitles = ['Joshua Chung', 'What I\'ve Built', 'Where I\'ve Worked', 'Technical Toolkit', 'Beyond the Terminal', "Let's Connect"];

function navigateTo(idx) {
  currentSection = idx;
  camTarget.x = SECTION_X[idx];
  camTarget.y = 0;
  camTarget.z = 0;

  // AUTO-CENTER: Reset rotation when navigating
  targetOrbitX = 0;
  targetOrbitY = 0;

  document.querySelectorAll('.hud-btn').forEach((btn, i) => btn.classList.toggle('active', i === idx));
  document.getElementById('sl-num').textContent = sectionLabels[idx];
  document.getElementById('sl-title').textContent = sectionTitles[idx];
  document.querySelectorAll('.mm-dot').forEach((d, i) => d.classList.toggle('active', i === idx));
  document.querySelectorAll('.mm-label').forEach((l, i) => l.classList.toggle('active', i === idx));
}

document.querySelectorAll('.hud-btn').forEach(btn => {
  btn.addEventListener('click', () => navigateTo(parseInt(btn.dataset.section)));
});

const mmNodes = document.getElementById('mm-nodes');
SECTIONS.forEach((s, i) => {
  const node = document.createElement('div');
  node.className = 'mm-node';
  node.innerHTML = `<div class="mm-dot ${i === 0 ? 'active' : ''}"></div><span class="mm-label ${i === 0 ? 'active' : ''}">${s.title}</span>`;
  node.addEventListener('click', () => navigateTo(i));
  mmNodes.appendChild(node);
});

// =============================================
// PANEL
// =============================================
const panel = document.getElementById('panel');
function openPanel(key) {
  const d = NODE_DATA[key];
  if (!d) return;
  document.getElementById('p-tag').textContent = d.tag;
  document.getElementById('p-title').textContent = d.title;
  document.getElementById('p-desc').textContent = d.desc;
  document.getElementById('p-tags').innerHTML = d.tags.map(t => `<span class="ptag">${t}</span>`).join('');
  document.getElementById('p-metrics').innerHTML = d.metrics.map(m => `<div class="pm"><div class="pm-val">${m.val}</div><div class="pm-label">${m.label}</div></div>`).join('');
  document.getElementById('p-links').innerHTML = d.links.map(l => `<a href="${l.href}" target="_blank" class="panel-link">${l.text}</a>`).join('');
  panel.classList.add('open');
}
function closePanel() { panel.classList.remove('open'); }
document.getElementById('panel-close').addEventListener('click', closePanel);

// =============================================
// ANIMATION LOOP
// =============================================
let clock = new THREE.Clock();
let targetOrbitX = 0, targetOrbitY = 0;

function animate() {
  requestAnimationFrame(animate);
  const t = clock.getElapsedTime();

  camPos.x += (camTarget.x - camPos.x) * 0.04;
  camPos.y += (6 + camTarget.y - camPos.y) * 0.04;
  camPos.z += (18 + camTarget.z - camPos.z) * 0.04;

  if (isOrbiting) {
    targetOrbitX += orbitDelta.x * 0.3;
    targetOrbitY = Math.max(-0.4, Math.min(0.4, targetOrbitY + orbitDelta.y * 0.3));
    orbitDelta.x *= 0.8;
    orbitDelta.y *= 0.8;
  } else {
    const mx = (mouse.x * 0.5);
    const my = (mouse.y * 0.3);
    targetOrbitX += (mx - targetOrbitX) * 0.02;
    targetOrbitY += (my - targetOrbitY) * 0.02;
  }

  // FIXED CAMERA LOGIC
  const radius = 18;
  const targetX = camPos.x;
  const targetY = camPos.y - 2;
  const targetZ = camPos.z;

  camera.position.x = targetX + Math.sin(targetOrbitX) * radius;
  camera.position.y = targetY + 8 + (targetOrbitY * 8); 
  camera.position.z = targetZ + Math.cos(targetOrbitX) * radius;
  camera.lookAt(targetX, targetY, targetZ);

  const heroGroup = sectionGroups[0];
  if (heroGroup.userData.satMeshes) {
    heroGroup.userData.satMeshes.forEach((sm, i) => {
      const cfg = heroGroup.userData.satellites[i];
      sm.userData.angle = (sm.userData.angle || cfg.angle) + cfg.speed;
      sm.position.x = Math.cos(sm.userData.angle) * cfg.r;
      sm.position.z = Math.sin(sm.userData.angle) * cfg.r;
      sm.position.y = Math.sin(sm.userData.angle * 0.7) * 1.5;
    });
  }

  // NODE PULSE & ROTATION
  sectionGroups.forEach((g, i) => {
    g.position.y = Math.sin(t * 0.4 + i * 1.2) * 0.4;
    g.children.forEach(child => {
      if (child.userData?.satConfig) return;
      
      // Constant slow spin
      child.rotation.y = t * (0.1 + i * 0.03);

      // Pulse effect for interactive nodes
      if (child.userData?.clickable) {
        const scale = 1 + Math.sin(t * 2) * 0.05;
        child.scale.set(scale, scale, scale);
      }
    });
  });

  particles.rotation.y = t * 0.01;
  raycaster.setFromCamera(mouse, camera);
  const intersects = raycaster.intersectObjects(allNodes, false);
  if (intersects.length > 0 && intersects[0].object.userData.clickable) {
    hoveredNode = intersects[0].object;
    canvas.style.cursor = 'none';
    document.getElementById('cring').classList.add('hover');
  } else {
    hoveredNode = null;
    document.getElementById('cring').classList.remove('hover');
  }

  renderer.render(scene, camera);
}

window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

const loadBar = document.getElementById('load-bar');
const loadText = document.getElementById('load-text');
const loadSteps = ['Initializing scene...', 'Loading geometries...', 'Building ML nodes...', 'Placing satellites...', 'Ready.'];
let step = 0;
const loadInterval = setInterval(() => {
  if (step >= loadSteps.length) {
    clearInterval(loadInterval);
    setTimeout(() => {
      document.getElementById('loading').classList.add('hidden');
      animate();
    }, 400);
    return;
  }
  loadBar.style.width = ((step + 1) / loadSteps.length * 100) + '%';
  loadText.textContent = loadSteps[step];
  step++;
}, 280);

setTimeout(() => {
  document.getElementById('controls-hint').style.opacity = '0';
}, 5000);
</script>
